# Codemagic CI/CD — SmartSpend
# ─────────────────────────────────────────────────────────────────────────
# Three workflows:
#   • pr-check        — pull requests: lint, codegen, analyze, test, coverage
#                       gate, Supabase db lint + pgTAP, unsigned iOS build.
#   • release         — `v*` tag push: test, signed IPA, Sentry symbol upload,
#                       TestFlight upload.
#   • supabase-deploy — `main` push: db push + Edge Function deploy.
#                       NOTE: the very first deploy is done MANUALLY with
#                       approval; this workflow exists for subsequent pushes.
#
# Secrets live in Codemagic environment groups, never in source. The group
# names referenced below (`supabase`, `sentry`, `appstore_connect`) must be
# created in the Codemagic UI with the variables listed in each `groups:`
# block. See README / the "Codemagic UI checklist" at the bottom of this file.
#
# Build-time secrets reach the app only via `--dart-define-from-file=.env`.
# The .env is reconstructed from environment-group variables in a pre-build
# script (it is git-ignored and never committed). The Flutter app receives
# only the anon key + public client IDs — never service_role or Gemini keys.
# ─────────────────────────────────────────────────────────────────────────

definitions:
  # Reusable shell snippet: rebuild .env from Codemagic env-group variables.
  # Keeps secrets out of source while feeding --dart-define-from-file=.env.
  scripts:
    - &write_env
      name: Reconstruct .env from environment groups
      script: |
        cat > "$CM_BUILD_DIR/.env" <<EOF
        SUPABASE_URL=$SUPABASE_URL
        SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        SENTRY_DSN=$SENTRY_DSN
        SENTRY_RELEASE=${SENTRY_RELEASE:-ci}
        SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
        APP_FLAVOR=production
        EOF
    - &flutter_packages
      name: Get Flutter packages
      script: flutter pub get
    - &codegen
      name: Run build_runner (Drift + DI codegen)
      script: dart run build_runner build --delete-conflicting-outputs
    - &gen_l10n
      name: Generate localizations
      script: flutter gen-l10n

workflows:
  # ───────────────────────────────────────────────────────────────────────
  # pr-check — gate every pull request before it can merge.
  # ───────────────────────────────────────────────────────────────────────
  pr-check:
    name: PR Check
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.44.0
      xcode: latest
      groups:
        - supabase   # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_ACCESS_TOKEN,
                     # SUPABASE_PROJECT_REF
        - sentry     # SENTRY_DSN (shared) — only DSN needed here
      vars:
        # Coverage gate. Current honest baseline is 79.3% (generated sources
        # excluded). The project TARGET is 80% — raise this to 80 once new
        # tests close the gap; the line below documents the intentional delta.
        COVERAGE_THRESHOLD: "79.0"
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - *write_env
      - *flutter_packages
      - *codegen
      - *gen_l10n
      - name: Analyze (fatal-infos)
        script: flutter analyze --fatal-infos
      - name: Run tests with coverage
        script: flutter test --coverage
      - name: Filter generated sources out of coverage
        script: |
          lcov --remove coverage/lcov.info \
            '*.g.dart' '*.freezed.dart' '*.config.dart' '*.mocks.dart' \
            '*/l10n/generated/*' '*/generated/*' \
            -o coverage/lcov.cleaned.info
      - name: Coverage gate (>= $COVERAGE_THRESHOLD%, target 80%)
        script: |
          PCT=$(lcov --summary coverage/lcov.cleaned.info 2>&1 \
            | grep -i 'lines' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Line coverage: ${PCT}% (threshold ${COVERAGE_THRESHOLD}%, target 80%)"
          awk -v p="$PCT" -v t="$COVERAGE_THRESHOLD" \
            'BEGIN { exit !(p+0 >= t+0) }' \
            || { echo "Coverage ${PCT}% below threshold ${COVERAGE_THRESHOLD}%"; exit 1; }
      - name: Install Supabase CLI
        script: |
          brew install supabase/tap/supabase
      - name: Start local Supabase stack
        script: |
          supabase start
      - name: Supabase db lint
        script: |
          supabase db lint --level warning
      - name: pgTAP RLS tests
        script: |
          supabase test db
      - name: Stop local Supabase stack
        script: |
          supabase stop --no-backup || true
      - name: Build iOS (unsigned)
        script: |
          flutter build ios --no-codesign --dart-define-from-file=.env
    artifacts:
      - coverage/lcov.cleaned.info
      - build/ios/iphoneos/*.app

  # ───────────────────────────────────────────────────────────────────────
  # release — build, symbolicate, and ship to TestFlight on a `v*` tag.
  # ───────────────────────────────────────────────────────────────────────
  release:
    name: Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: 3.44.0
      xcode: latest
      groups:
        - supabase
        - sentry            # SENTRY_DSN, SENTRY_AUTH_TOKEN, SENTRY_ORG,
                            # SENTRY_PROJECT
        - appstore_connect  # APP_STORE_CONNECT_* (managed by integration)
      vars:
        BUNDLE_ID: "site.tunckankilic.smartspend"
        APP_STORE_APPLE_ID: "6768886898"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: site.tunckankilic.smartspend
    integrations:
      app_store_connect: SmartSpend App Store Connect Key  # p8 API key
    # CI shipping is now ADOPTED: pushing a `v*` tag builds a signed IPA and
    # uploads it to TestFlight. App Store *release* submission stays manual
    # (see publishing.submit_to_app_store: false below).
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true
    scripts:
      - *write_env
      - *flutter_packages
      - *codegen
      - *gen_l10n
      - name: Derive version + build number from tag
        script: |
          # Tag is like v1.2.3 → VERSION=1.2.3, BUILD=Codemagic build number.
          VERSION="${CM_TAG#v}"
          BUILD="$PROJECT_BUILD_NUMBER"
          echo "VERSION=$VERSION" >> "$CM_ENV"
          echo "BUILD=$BUILD" >> "$CM_ENV"
          echo "SENTRY_RELEASE=${VERSION}+${BUILD}" >> "$CM_ENV"
      - name: Run tests
        script: flutter test
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build signed IPA (with Dart debug symbols)
        script: |
          # --split-debug-info emits the Dart symbol files Sentry needs to
          # symbolicate Dart-level stack traces (not just native iOS frames).
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$BUILD" \
            --split-debug-info=build/symbols \
            --dart-define=SENTRY_RELEASE="${VERSION}+${BUILD}" \
            --dart-define-from-file=.env \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Upload symbols to Sentry (iOS dSYMs + Dart symbols)
        script: |
          # sentry_dart_plugin reads org/project from pubspec.yaml's `sentry:`
          # block and the auth token from SENTRY_AUTH_TOKEN (sentry env group).
          # SENTRY_RELEASE was exported above. Non-fatal: a symbol-upload hiccup
          # must not block shipping the build to TestFlight.
          export SENTRY_RELEASE="${VERSION}+${BUILD}"
          dart run sentry_dart_plugin || echo "WARN: Sentry symbol upload failed"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # App Store release submission stays MANUAL (review notes, screenshots,
        # privacy answers must be filled in App Store Connect first).
        submit_to_app_store: false

  # ───────────────────────────────────────────────────────────────────────
  # supabase-deploy — apply migrations + deploy Edge Functions on `main`.
  #
  # ⚠️ The FIRST production deploy is done MANUALLY with approval (see README /
  #    Transfer doc). This workflow automates SUBSEQUENT main-branch pushes.
  #    Migrations and function deploys are shared + hard to undo — keep this
  #    workflow disabled in the Codemagic UI until the first manual deploy is
  #    verified, then enable it.
  # ───────────────────────────────────────────────────────────────────────
  supabase-deploy:
    name: Supabase Deploy
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        - supabase   # SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF
    # ⚠️ TEMPORARILY DISABLED — the FIRST prod Supabase deploy is done MANUALLY
    # (supabase db push + functions deploy). The auto-trigger on `main` push is
    # commented out so merging Day-11-Release → main does NOT fire an
    # uncontrolled prod deploy. Re-enable (uncomment) ONLY after the first
    # manual deploy is verified.
    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true
    #   cancel_previous_builds: true
    scripts:
      - name: Install Supabase CLI
        script: |
          brew install supabase/tap/supabase
      - name: Link project
        script: |
          # SUPABASE_ACCESS_TOKEN authenticates non-interactively.
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Push database migrations
        script: |
          supabase db push
      - name: Deploy Edge Functions
        script: |
          supabase functions deploy gemini-ocr-fallback
          supabase functions deploy delete-account
          supabase functions deploy apple-register
          supabase functions deploy export-csv
          supabase functions deploy export-pdf
          # weekly-summary is DEFERRED from v1 — its Deno.serve entry-point is
          # still commented out (unfinished stub). Re-enable this line once the
          # function is finished and supabase/cron/weekly_summary_cron.sql is
          # applied. Deploying it now would ship a function with no handler.
          # supabase functions deploy weekly-summary
        # NOTE: Edge Function SECRETS are set once via `supabase secrets set …`
        # — a MANUAL step, never automated here, so secrets never touch CI logs:
        #   GEMINI_API_KEY, SUPABASE_SERVICE_ROLE_KEY
        #   APPLE_PRIVATE_KEY_B64, APPLE_TEAM_ID, APPLE_KEY_ID, APPLE_CLIENT_ID
        #     (Sign in with Apple token revocation —
        #      see docs/internal/APPLE_DELETE_SETUP.md)

# ─────────────────────────────────────────────────────────────────────────
# Codemagic UI checklist — environment-group variables to enter by hand
# (Settings → Environment variables → create these groups):
#
#   group "supabase"
#     SUPABASE_URL            prod project URL (https://<ref>.supabase.co)
#     SUPABASE_ANON_KEY       prod anon/publishable key (safe to ship)
#     SUPABASE_ACCESS_TOKEN   personal access token (deploy auth)  [secure]
#     SUPABASE_PROJECT_REF    prod project ref
#     (no GOOGLE_* vars — the app has no Google sign-in; auth is
#      email/password + Sign in with Apple only)
#
#   group "sentry"
#     SENTRY_DSN              client DSN
#     SENTRY_AUTH_TOKEN       upload token                          [secure]
#     (org/project live in pubspec.yaml's `sentry:` block — already set to
#      org: tuncsoftwareagency / project: smartspend; not secrets, no env var)
#
#   group "appstore_connect"
#     Created automatically by the App Store Connect API key integration
#     ("SmartSpend App Store Connect Key"): upload the p8, key id, issuer id.
#
# Also in the UI:
#   • Add the App Store Connect API key integration (p8) and reference it as
#     the `integrations.app_store_connect` name above.
#   • Set up iOS code signing (automatic) under the team / bundle id
#     site.tunckankilic.smartspend.
#   • Replace APP_STORE_APPLE_ID with the numeric app id once the app record
#     exists in App Store Connect.
#   • Enable the `supabase-deploy` workflow only AFTER the first manual deploy.
# ─────────────────────────────────────────────────────────────────────────
