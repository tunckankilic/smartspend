name: smartspend
description: "SmartSpend — AI-powered expense tracker with OCR receipt scanning."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7

  # Stream operators (debounce for search input)
  stream_transform: ^2.1.0

  # Functional error handling
  dartz: ^0.10.1

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Routing
  go_router: ^17.2.3

  # Local database (Drift / SQLite)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.0

  # Backend (Supabase)
  supabase_flutter: ^2.8.0

  # Auth helpers
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0

  # Observability
  sentry_flutter: ^8.11.2

  # Utilities
  logger: ^2.5.0
  intl: ^0.20.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0
  shared_preferences: ^2.3.3

  # Scan pipeline
  image_picker: ^1.1.2
  image: ^4.5.4
  # OCR (on-device, free)
  google_mlkit_text_recognition: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^10.2.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  injectable_generator: ^3.0.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/ml/
